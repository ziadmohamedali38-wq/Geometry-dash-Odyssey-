<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GD Odyssey</title>
    <style>
        :root { --neon: #00ffff; --gd-blue: #2874fc; --gold: #ffcf40; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; user-select: none; }
        
        /* UI Overlays */
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 10000; pointer-events: auto; }
        .hidden { display: none !important; }
        
        .btn { padding: 18px 50px; background: var(--gd-blue); border: 4px solid white; color: white; font-size: 1.4rem; font-weight: 900; border-radius: 15px; cursor: pointer; margin: 10px; text-shadow: 2px 2px #000; }
        .btn-small { padding: 10px 20px; font-size: 1rem; background: #444; }
        
        .selector { display: flex; align-items: center; gap: 30px; }
        .arrow { background: none; border: none; color: white; font-size: 5rem; cursor: pointer; }
        
        #pause-btn { position: fixed; top: 15px; right: 15px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 10px; z-index: 5000; }
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: var(--neon); font-size: 1.2rem; pointer-events: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="hud" class="hidden">ATTEMPTS: <span id="att-val">1</span> | <span id="progress-val">0%</span></div>
    <button id="pause-btn" class="hidden" onclick="pauseGame()">||</button>

    <div id="menu-home" class="overlay">
        <h1 style="font-size: 3.5rem; text-shadow: 0 0 20px var(--neon); margin:0;">GD ODYSSEY</h1>
        <button class="btn" onclick="nav('menu-levels')">PLAY</button>
        <button class="btn btn-small" onclick="nav('menu-icons')">ICON KIT</button>
    </div>

    <div id="menu-icons" class="overlay hidden">
        <h2>ICON COLOR</h2>
        <div style="display:flex; gap:15px; margin-bottom: 20px;">
            <div onclick="setColor('#0ff')" style="width:60px; height:60px; background:#0ff; border:4px solid white; cursor:pointer;"></div>
            <div onclick="setColor('#f0f')" style="width:60px; height:60px; background:#f0f; border:4px solid white; cursor:pointer;"></div>
            <div onclick="setColor('#ffff00')" style="width:60px; height:60px; background:#ffff00; border:4px solid white; cursor:pointer;"></div>
        </div>
        <button class="btn" onclick="nav('menu-home')">SAVE</button>
    </div>

    <div id="menu-levels" class="overlay hidden">
        <div class="selector">
            <button class="arrow" onclick="changeLvl(-1)">◀</button>
            <div style="text-align: center; border: 4px solid #333; padding: 40px; border-radius: 25px; background: rgba(255,255,255,0.05); width: 320px;">
                <h2 id="lvl-name">WELCOMING TIME</h2>
                <div id="lvl-mode" style="color:#aaa; margin-bottom:10px;">MODE: SHIP</div>
                <button class="btn" onclick="startGame()">START</button>
            </div>
            <button class="arrow" onclick="changeLvl(1)">▶</button>
        </div>
        <button class="btn btn-small" onclick="nav('menu-home')">BACK</button>
    </div>

    <div id="menu-win" class="overlay hidden">
        <h1 style="color:var(--gold); font-size: 3rem;">LEVEL COMPLETE!</h1>
        <button class="btn" onclick="nav('menu-levels')">MENU</button>
    </div>

    <div id="menu-pause" class="overlay hidden">
        <h1>PAUSED</h1>
        <button class="btn" onclick="resumeGame()">RESUME</button>
        <button class="btn btn-small" onclick="location.reload()">QUIT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let state = 'MENU', att = 1, camX = 0, currentIdx = 0, paused = false;
        let playerColor = '#0ff';

        const levels = [
            { name: 'WELCOMING TIME', mode: 'ship', len: 5000, color: '#0ff' },
            { name: 'BACK ON TIME', mode: 'cube', len: 6000, color: '#f0f' },
            { name: 'POLAR DICE', mode: 'cube', len: 7000, color: '#0f0' },
            { name: 'DRY DESERT', mode: 'cube', len: 8500, color: '#ff9900' }
        ];

        let p = { x: 250, y: 0, vy: 0, size: 42, rot: 0, isShip: false, isHold: false, flipped: false };
        let world = [];

        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        window.nav = (id) => {
            document.querySelectorAll('.overlay').forEach(m => m.classList.add('hidden'));
            if(id !== 'none') document.getElementById(id).classList.remove('hidden');
        };

        window.setColor = (c) => { playerColor = c; };

        window.changeLvl = (dir) => {
            currentIdx = (currentIdx + dir + levels.length) % levels.length;
            document.getElementById('lvl-name').innerText = levels[currentIdx].name;
            document.getElementById('lvl-mode').innerText = "MODE: " + levels[currentIdx].mode.toUpperCase();
        };

        window.startGame = () => {
            state = 'PLAY';
            nav('none');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            resetGame();
        };

        window.pauseGame = () => { paused = true; nav('menu-pause'); };
        window.resumeGame = () => { paused = false; nav('none'); };

        function resetGame() {
            camX = 0; p.vy = 0; p.rot = 0; p.flipped = false;
            p.isShip = (levels[currentIdx].mode === 'ship');
            p.y = canvas.height * 0.75 - p.size;

                    {x: 5000, t: 's'}, {x: 6000, t: 's'}, {x: 7500, t: 's'}
                ];
            } else {
                world = [{x: 1200, t: 's'}, {x: 2000, t: 'p'}, {x: 2800, t: 's', y: 150}, {x: 3500, t: 'p'}];
            }
        }
