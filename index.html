<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GD Odyssey</title>
    <style>
        :root { --neon: #00ffff; --gd-blue: #2874fc; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; user-select: none; }
        
        /* UI Overlays */
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 10000; pointer-events: auto; }
        .hidden { display: none !important; }
        
        /* Buttons */
        .btn { padding: 18px 50px; background: var(--gd-blue); border: 4px solid white; color: white; font-size: 1.4rem; font-weight: 900; border-radius: 15px; cursor: pointer; margin: 10px; text-shadow: 2px 2px #000; }
        .btn-small { padding: 10px 20px; font-size: 1rem; background: #444; }
        .more-btn { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #555; border: 3px solid white; color: white; font-size: 1.5rem; }

        /* Level Selector */
        .selector { display: flex; align-items: center; gap: 30px; }
        .arrow { background: none; border: none; color: white; font-size: 5rem; cursor: pointer; }
        
        /* Pause Menu */
        #pause-btn { position: fixed; top: 15px; right: 15px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 10px; z-index: 5000; }
        
        /* HUD */
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: var(--neon); font-size: 1.2rem; pointer-events: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="hud" class="hidden">ATTEMPTS: <span id="att-val">1</span> | <span id="progress-val">0%</span></div>
    <button id="pause-btn" class="hidden" onclick="pauseGame()">||</button>

    <div id="menu-home" class="overlay">
        <h1 style="font-size: 3.5rem; text-shadow: 0 0 20px var(--neon); margin:0;">GD ODYSSEY</h1>
        <button class="btn" onclick="nav('menu-levels')">PLAY</button>
        <button class="btn btn-small" onclick="nav('menu-icons')">ICON KIT</button>
        <button class="more-btn" onclick="alert('More Games Coming!')">...</button>
    </div>

    <div id="menu-icons" class="overlay hidden">
        <h2>SELECT ICON COLOR</h2>
        <div style="display:flex; gap:15px;">
            <div onclick="setColor('#0ff')" style="width:50px; height:50px; background:#0ff; border:3px solid white;"></div>
            <div onclick="setColor('#f0f')" style="width:50px; height:50px; background:#f0f; border:3px solid white;"></div>
            <div onclick="setColor('#0f0')" style="width:50px; height:50px; background:#0f0; border:3px solid white;"></div>
        </div>
        <button class="btn" onclick="nav('menu-home')">SAVE</button>
    </div>

    <div id="menu-levels" class="overlay hidden">
        <div class="selector">
            <button class="arrow" onclick="changeLvl(-1)">◀</button>
            <div style="text-align: center; border: 4px solid #333; padding: 40px; border-radius: 25px; background: rgba(255,255,255,0.05);">
                <h2 id="lvl-name">WELCOMING TIME</h2>
                <div id="lvl-mode" style="color:#aaa; margin-bottom:10px;">MODE: SHIP</div>
                <button class="btn" onclick="startGame()">START</button>
            </div>
            <button class="arrow" onclick="changeLvl(1)">▶</button>
        </div>
        <button class="btn btn-small" onclick="nav('menu-home')">BACK</button>
    </div>

    <div id="menu-pause" class="overlay hidden">
        <h1>PAUSED</h1>
        <button class="btn" onclick="resumeGame()">RESUME</button>
        <button class="btn btn-small" onclick="location.reload()">QUIT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let state = 'MENU', att = 1, camX = 0, currentIdx = 0, paused = false;
        let playerColor = '#0ff';

        const levels = [
            { name: 'WELCOMING TIME', mode: 'ship', len: 5000 },
            { name: 'BACK ON TIME', mode: 'cube', len: 6000 },
            { name: 'DRY DESERT', mode: 'cube', len: 8000 }
        ];

        let p = { x: 250, y: 0, vy: 0, size: 42, rot: 0, isShip: false, isHold: false, flipped: false };
        let world = [];

        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        window.nav = (id) => {
            document.querySelectorAll('.overlay').forEach(m => m.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.setColor = (c) => { playerColor = c; };

        window.changeLvl = (dir) => {
            currentIdx = (currentIdx + dir + levels.length) % levels.length;
            document.getElementById('lvl-name').innerText = levels[currentIdx].name;
            document.getElementById('lvl-mode').innerText = "MODE: " + levels[currentIdx].mode.toUpperCase();
        };

        window.startGame = () => {
            state = 'PLAY';
            nav('none');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('pause-btn').classList.remove('hidden');
            resetGame();
        };

        window.pauseGame = () => { paused = true; nav('menu-pause'); };
        window.resumeGame = () => { paused = false; nav('none'); };

        function resetGame() {
            camX = 0; p.vy = 0; p.rot = 0; p.flipped = false;
            p.isShip = (levels[currentIdx].mode === 'ship');
            p.y = canvas.height * 0.75 - p.size;
            
            // Build level with Spikes (s) and Portals (p)
            world = [
                {x: 1200, t: 's'}, {x: 1800, t: 'p'}, // Portal at 1800
                {x: 2400, t: 's', y: 100}, {x: 3000, t: 'p'}, // Flip back
                {x: 3800, t: 's'}
            ];
        }

        function handleInput(down) {
            if (paused) return;
            p.isHold = down;
            // Fix Jump Logic: Only jump if on floor or ceiling (if flipped)
            const floor = canvas.height * 0.75;
            const onSurface = p.flipped ? (p.y <= 60) : (p.y >= floor - p.size - 5);
            
            if (state === 'PLAY' && down && !p.isShip && onSurface) {
                p.vy = p.flipped ? 1200 : -1200;
            }
        }

        window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') handleInput(true); }, {passive: false});
        window.addEventListener('touchend', () => handleInput(false));
        window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') handleInput(true); });
        window.addEventListener('mouseup', () => handleInput(false));

        function update(dt) {
            if (state !== 'PLAY' || paused) return;
            
            let gravityDir = p.flipped ? -1 : 1;

            if (p.isShip) {
                p.vy += (p.isHold ? -3800 : 2800) * gravityDir * dt;
                p.rot = p.vy * 0.1;
            } else {
                p.vy += (4800 * gravityDir) * dt;
                const floor = canvas.height * 0.75;
                if ((!p.flipped && p.y < floor - p.size) || (p.flipped && p.y > 60)) {
                    p.rot += 500 * dt;
                } else {
                    p.rot = Math.round(p.rot / 90) * 90;
                }
            }

            p.y += p.vy * dt;
            camX += 750 * dt;

            // Collision with Ground/Ceiling
            const floor = canvas.height * 0.75;
            if (!p.flipped && p.y > floor - p.size) { p.y = floor - p.size; p.vy = 0; }
            if (p.flipped && p.y < 60) { p.y = 60; p.vy = 0; }

            // Obstacles and Portals
            world.forEach(obj => {
                let ox = obj.x - camX + p.x;
                let oy = obj.y || (p.flipped ? 60 : floor - 50);

                if (p.x < ox + 40 && p.x + 35 > ox && p.y < oy + 50 && p.y + 40 > oy) {
                    if (obj.t === 's') { // Spike
                        att++; document.getElementById('att-val').innerText = att; resetGame();
                    } else if (obj.t === 'p') { // Portal
                        p.flipped = !p.flipped;
                        obj.x = -9999; // Disable portal after use
                    }
                }
            });

            document.getElementById('progress-val').innerText = Math.min(Math.floor((camX / levels[currentIdx].len) * 100), 100) + "%";
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const floor = canvas.height * 0.75;
            
            // Draw Ground and Ceiling
            ctx.fillStyle = '#111'; ctx.fillRect(0, floor, canvas.width, 5);
            ctx.fillRect(0, 60, canvas.width, 5);

            if (state === 'PLAY') {
                ctx.save();
                ctx.translate(p.x + 21, p.y + 21);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = playerColor;
                ctx.fillRect(-21, -21, 42, 42); // Player Icon
                ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.strokeRect(-21, -21, 42, 42);
                ctx.restore();

                world.forEach(obj => {
                    let ox = obj.x - camX + p.x;
                    let oy = obj.y || (p.flipped ? 60 : floor);
                    if (obj.t === 's') {
                        ctx.fillStyle = '#f06'; ctx.beginPath();
                        ctx.moveTo(ox, oy); ctx.lineTo(ox+25, oy - (p.flipped ? -50 : 50)); ctx.lineTo(ox+50, oy); ctx.fill();
                    } else if (obj.t === 'p') {
                        ctx.fillStyle = '#0f0'; ctx.fillRect(ox, floor - 150, 20, 150); // Portal
                    }
                });
            }
        }

        function loop(t) {
            let dt = Math.min((t - (this.lt || t)) / 1000, 0.02);
            this.lt = t; update(dt); draw();
            requestAnimationFrame(loop);
        }

        init(); requestAnimationFrame(loop); window.onresize = init;
    </script>
</body>
</html>
