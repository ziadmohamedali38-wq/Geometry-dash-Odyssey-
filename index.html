<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GD Odyssey</title>
    <style>
        :root { --neon: #00ffff; --gd-blue: #2874fc; --gold: #ffcf40; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; user-select: none; }
        
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 10000; }
        .hidden { display: none !important; }
        
        /* Buttons */
        .btn { padding: 15px 40px; background: var(--gd-blue); border: 4px solid white; color: white; font-size: 1.2rem; font-weight: 900; border-radius: 12px; cursor: pointer; margin: 8px; text-shadow: 2px 2px #000; }
        .btn-small { padding: 8px 15px; font-size: 0.9rem; background: #333; }
        
        /* Layouts */
        .home-footer { position: absolute; bottom: 15px; font-size: 0.7rem; color: #666; text-align: center; line-height: 1.4; }
        .selector { display: flex; align-items: center; gap: 20px; }
        .arrow { background: none; border: none; color: white; font-size: 4rem; cursor: pointer; }
        
        #hud { position: fixed; top: 15px; left: 15px; z-index: 100; color: var(--neon); font-size: 1.1rem; pointer-events: none; }
        #pause-trigger { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: rgba(255,255,255,0.1); border: 2px solid white; color: white; border-radius: 8px; z-index: 5000; }
        
        canvas { display: block; width: 100vw; height: 100vh; }
        .coming-soon { color: #555; font-size: 0.8rem; font-style: italic; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="hud" class="hidden">ATTEMPTS: <span id="att-val">1</span> | <span id="progress-val">0%</span></div>
    <button id="pause-trigger" class="hidden" onclick="togglePause(true)">||</button>

    <div id="menu-home" class="overlay">
        <h1 style="font-size: 3rem; text-shadow: 0 0 15px var(--neon); margin:0;">GD ODYSSEY</h1>
        <button class="btn" onclick="nav('menu-levels')">PLAY</button>
        <div style="display:flex;">
            <button class="btn btn-small" onclick="nav('menu-icons')">ICON KIT</button>
            <button class="btn btn-small" onclick="nav('menu-more')">MORE</button>
        </div>
        
        <div class="home-footer">
            CREDITS: ziadmohamedali38-wq9<br>
            TOOLS: GITHUB • VERCEL • MEDIAN
        </div>
    </div>

    <div id="menu-more" class="overlay hidden">
        <h2>STATS & ADVANCEMENTS</h2>
        <div style="text-align:left; background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; width:280px; margin-bottom: 20px;">
            <p style="margin: 5px 0;">Total Jumps: <span id="stat-jumps">0</span></p>
            <p style="margin: 5px 0;">Levels Completed: <span id="stat-wins">0</span></p>
            <hr border="1" color="#333" style="margin: 15px 0;">
            <p class="coming-soon">EDITOR (COMING SOON)</p>
            <p class="coming-soon">ONLINE PLAY (COMING SOON)</p>
        </div>
        <button class="btn btn-small" onclick="nav('menu-home')">BACK</button>
    </div>

    <div id="menu-icons" class="overlay hidden">
        <h2>ICON KIT</h2>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div onclick="setColor('#0ff')" style="width:50px; height:50px; background:#0ff; border:3px solid white; cursor:pointer;"></div>
            <div onclick="setColor('#f0f')" style="width:50px; height:50px; background:#f0f; border:3px solid white; cursor:pointer;"></div>
            <div onclick="setColor('#ff0')" style="width:50px; height:50px; background:#ff0; border:3px solid white; cursor:pointer;"></div>
        </div>
        <button class="btn" onclick="nav('menu-home')">SAVE</button>
    </div>

    <div id="menu-levels" class="overlay hidden">
        <div class="selector">
            <button class="arrow" onclick="changeLvl(-1)">◀</button>
            <div style="text-align: center; border: 3px solid #444; padding: 30px; border-radius: 20px; width:260px;">
                <h2 id="lvl-name">WELCOMING TIME</h2>
                <div id="lvl-mode" style="color:#888; margin-bottom:10px;">MODE: SHIP</div>
                <button class="btn" onclick="startGame()">START</button>
            </div>
            <button class="arrow" onclick="changeLvl(1)">▶</button>
        </div>
        <button class="btn btn-small" onclick="nav('menu-home')">BACK</button>
    </div>

    <div id="menu-pause" class="overlay hidden">
        <h1 style="color:var(--neon)">PAUSED</h1>
        <button class="btn" onclick="togglePause(false)">RESUME</button>
        <button class="btn btn-small" style="background:#600" onclick="location.reload()">QUIT</button>
    </div>

    <canvas id="gameCanvas"></canvas>
