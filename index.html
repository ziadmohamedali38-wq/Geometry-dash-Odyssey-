<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Odyssey: Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDEw8iPR12evpKzHBQmYnlcTdoYD3pK-xc",
            authDomain: "geometry-dash-odessy.firebaseapp.com",
            projectId: "geometry-dash-odessy",
            storageBucket: "geometry-dash-odessy.firebasestorage.app",
            messagingSenderId: "824100531511",
            appId: "1:824100531511:web:b25f7b5e688c425cd2feb2"
        };
        firebase.initializeApp(firebaseConfig);
        
        // Attach to window so game.js can always see them
        window.auth = firebase.auth();
        window.db = firebase.firestore();

        // Sign in anonymously so the editor can save immediately
        window.auth.signInAnonymously().catch(err => console.error("Auth Error:", err));

        // Editor Cloud Saver
        window.LevelManager = {
            saveLevel: async (name, data) => {
                try {
                    await window.db.collection("levels").doc(name).set({ blocks: data });
                    alert("Level saved to cloud!");
                } catch (e) {
                    console.error("Save failed:", e);
                }
            }
        };
    </script>
</head>
<body>

    <div id="ui-layer">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1920" height="1080"></canvas>

    <script src="game.js"></script>
</body>
</html>
